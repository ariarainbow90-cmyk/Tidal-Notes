<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#6b4a2a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tidal">
<title>Tidal Notes</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Playfair+Display:ital,wght@0,400;1,400&family=Special+Elite&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@300;400;600&family=LXGW+WenKai&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Lora','Noto Serif SC',serif;background:#f0e8d8;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}
:root{
  --br:#6b4a2a;
  --li:#fdf8f0;
  --bd:#c0a070;
  --tx:#3d2210;
  --mu:#6b4a2a;
  --hd:#e8d8c0;
  --ca:#ede0ca;
}
.view{display:none;flex-direction:column;height:100%;overflow:hidden;}
.view.active{display:flex;animation:vIn .18s ease;}
@keyframes vIn{from{opacity:0}to{opacity:1}}
/* ── TOPBAR (shared layout/vv) ── */
.topbar{display:flex;align-items:center;gap:9px;padding:10px 14px;background:var(--hd);border-bottom:1px solid var(--bd);flex-shrink:0;}
.topbar-col{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.topbar-main{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--tx);white-space:nowrap;}
.topbar-sub{font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;color:var(--mu);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-back{background:none;border:none;cursor:pointer;color:var(--mu);font-size:22px;line-height:1;padding:0;flex-shrink:0;}
.btn-star{background:none;border:none;cursor:pointer;font-size:20px;padding:0;flex-shrink:0;}
.btn-save{
  background: linear-gradient(135deg, #7a5030 0%, #6b4a2a 100%);
  color: var(--li);
  border: none;
  border-radius: 4px;
  padding: 7px 15px;
  cursor: pointer;
  font-family: 'Lora', serif;
  font-size: 13px;
  flex-shrink: 0;
  box-shadow: 0 1px 3px rgba(60, 30, 10, 0.15);
  transition: all 0.15s ease;
}
.btn-save:active{box-shadow:0 1px 2px rgba(60,30,10,0.1);transform:translateY(1px);}
/* ── CALENDAR HEADER ── */
.hdr{
  background:var(--hd);
  border-bottom:1px solid var(--bd);
  padding:12px 14px 10px;
  flex-shrink:0;
  box-shadow:0 1px 6px rgba(80,50,20,0.05);
  position:relative;
  z-index:1;
}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr-l{display:flex;align-items:center;gap:9px;flex-shrink:0;min-width:0;}
.btn-menu{background:none;border:none;cursor:pointer;color:var(--mu);font-size:20px;padding:0;line-height:1;flex-shrink:0;}
.app-name-block{display:flex;flex-direction:column;line-height:1.2;}
.app-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;color:var(--tx);letter-spacing:.02em;white-space:nowrap;}
.app-sub-line{display:flex;align-items:center;gap:6px;}
.app-sub{font-size:10px;color:var(--mu);letter-spacing:.06em;white-space:nowrap;}
.app-cnt{font-size:10px;color:var(--mu);white-space:nowrap;}
.hdr-btns{display:flex;gap:5px;flex-shrink:0;}
.btn-sm{background:none;border:1px solid var(--bd);border-radius:3px;padding:5px 8px;cursor:pointer;color:var(--mu);font-size:11px;font-family:'Lora',serif;white-space:nowrap;}
/* ── CALENDAR ── */
.calw{background:var(--ca);border-bottom:1px solid var(--bd);padding:8px 12px;flex-shrink:0;}
.calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.cnbtn{background:none;border:none;cursor:pointer;color:var(--mu);font-size:22px;line-height:1;padding:0 4px;}
.calmth{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--tx);font-style:italic;}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.calwd{text-align:center;font-size:10px;color:var(--mu);padding:2px 0;}
.calday{background:transparent;border:1px solid transparent;border-radius:50%;width:30px;height:30px;margin:auto;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--tx);font-size:12px;position:relative;font-family:'Lora',serif;}
.calday.today{border-color:var(--mu)!important;}
.calday.sel{background:var(--br);color:var(--li);}
.caldot{position:absolute;bottom:2px;width:3px;height:3px;border-radius:50%;background:var(--mu);}
.calday.sel .caldot{background:rgba(253,248,240,0.6);}
.cal-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--mu);text-align:center;padding:7px 0 4px;user-select:none;pointer-events:none;}
/* ── ENTRY LIST ── */
.earea{flex:1;overflow-y:auto;padding:13px 14px;}
.dayhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.daytitle{font-family:'Cormorant Garamond','Noto Serif SC',serif;font-size:16px;font-style:italic;color:var(--tx);}
.daysub{font-size:11px;color:var(--mu);}
.btn-new{
  background: linear-gradient(135deg, #7a5030 0%, #6b4a2a 100%);
  color: var(--li);
  border: none;
  border-radius: 4px;
  padding: 7px 13px;
  cursor: pointer;
  font-family: 'Lora', serif;
  font-size: 13px;
  box-shadow: 0 1px 3px rgba(60,30,10,0.15);
  transition: all 0.15s ease;
}
.btn-new:active{box-shadow:0 1px 2px rgba(60,30,10,0.1);transform:translateY(1px);}
.ecard{
  border:1px solid rgba(150,110,70,0.25);
  border-radius:5px;
  padding:11px 14px;
  cursor:pointer;
  margin-bottom:9px;
  transition:all 0.15s ease;
  user-select:none;
  box-shadow:0 1px 3px rgba(80,50,20,0.04);
}
.ecard:active{box-shadow:0 2px 16px rgba(80,50,20,0.18);transform:scale(0.985);}
.ecard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.ecard-date{font-size:11px;opacity:0.42;letter-spacing:.07em;}
.ecard-meta{display:flex;align-items:center;gap:5px;}
.chip{font-size:10px;padding:1px 7px;border-radius:10px;background:rgba(107,74,42,0.1);color:var(--br);}
.ecard-body{font-size:13px;line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.empty{display:flex;flex-direction:column;align-items:center;padding-top:40px;gap:10px;opacity:0.5;}
.empty-ic{font-size:34px;}
.empty-tx{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:#8b6b4a;}
/* ── SIDEBAR ── */
#sb-ov{position:fixed;inset:0;background:rgba(40,20,5,0.45);z-index:200;display:none;opacity:0;transition:opacity 0.25s;}
#sb-ov.vis{opacity:1;}
#sb-pn{position:absolute;top:0;left:0;bottom:0;width:82%;max-width:300px;background:var(--li);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.25s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 20px rgba(80,50,20,0.14);}
#sb-pn.open{transform:translateX(0);}
.sb-hdr{background:var(--hd);padding:14px 13px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.sb-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--tx);}
.sb-search{width:100%;background:var(--li);border:1px solid var(--bd);border-radius:16px;padding:6px 12px;font-family:'Lora','Noto Serif SC',serif;font-size:13px;color:var(--tx);outline:none;margin-top:9px;}
.sb-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;}
.sbtab{background:none;border:1px solid var(--bd);border-radius:12px;padding:3px 9px;cursor:pointer;font-family:'Lora','Noto Serif SC',serif;font-size:11px;color:var(--mu);}
.sbtab.on{background:var(--br);color:var(--li);border-color:var(--br);}
.sb-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--mu);opacity:0.7;padding:7px 13px 2px;line-height:1.5;pointer-events:none;user-select:none;border-top:1px solid rgba(192,160,112,0.25);margin-top:2px;}
.sb-list{flex:1;overflow-y:auto;padding:9px 11px;}
.sb-e{
  padding:9px 11px;
  border-radius:5px;
  cursor:pointer;
  margin-bottom:5px;
  border:1px solid rgba(150,110,70,0.15);
  background:rgba(253,248,240,0.7);
  transition:background 0.15s, box-shadow 0.15s, transform 0.15s;
}
.sb-e:active{
  background:rgba(237,224,202,0.7);
  box-shadow:inset 0 1px 3px rgba(80,50,20,0.06);
  transform:scale(0.98);
}
.sb-e-date{font-size:10px;color:var(--mu);margin-bottom:2px;letter-spacing:.05em;}
.sb-e-body{font-size:12px;line-height:1.6;color:var(--tx);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sb-e-ft{display:flex;align-items:center;gap:4px;margin-top:3px;}
/* ── CONTEXT MENU (long press) ── */
#ctx-bg{display:none;position:fixed;inset:0;z-index:399;}
#ctx-bg.show{display:block;}
#ctx-menu{display:none;position:fixed;z-index:400;background:var(--li);border-radius:14px;box-shadow:0 8px 36px rgba(40,20,5,0.28);overflow:hidden;min-width:170px;}
#ctx-menu.show{display:block;}
.ctx-item{display:flex;align-items:center;gap:11px;padding:14px 18px;cursor:pointer;font-family:'Lora','Noto Serif SC',serif;font-size:14px;color:var(--tx);border-bottom:1px solid rgba(192,160,112,0.2);}
.ctx-item:last-child{border-bottom:none;}
.ctx-item.danger{color:rgba(180,60,50,0.85);}
.ctx-item:active{background:var(--ca);}
/* ── VIEW MODE ── */
#vv{transition:background .35s ease;}
.vv-bg{display:none;}
.vv-inner{position:relative;display:flex;flex-direction:column;height:100%;z-index:1;}
.vv-top{display:flex;align-items:center;padding:12px 14px;flex-shrink:0;}
.vv-back{background:none;border:none;cursor:pointer;color:rgba(253,240,220,0.75);font-size:22px;padding:0;line-height:1;}
.vv-star{background:none;border:none;cursor:pointer;font-size:20px;padding:0;margin-left:auto;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.22));}
.vv-card-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;}
.vv-card-inner{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 24px;min-height:min-content;}
.vv-footer{padding:10px 16px 26px;display:flex;gap:10px;flex-shrink:0;}
.vv-btn-exp{flex:1;background:rgba(107,74,42,0.72);border:none;border-radius:5px;padding:12px;cursor:pointer;font-family:'Lora',serif;font-size:13px;color:rgba(253,240,220,0.92);backdrop-filter:blur(4px);}
.vv-btn-edit{flex:1;background:rgba(253,240,220,0.12);border:1px solid rgba(253,240,220,0.28);border-radius:5px;padding:12px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:rgba(253,240,220,0.8);letter-spacing:.04em;backdrop-filter:blur(4px);}
/* 便签主体 — 不旋转，纸色由JS注入 */
#vv-card{
  position:relative;
  width:88%;max-width:320px;
  padding:34px 24px 28px;
  border:1.5px dashed rgba(139,107,74,0.28);
  box-shadow:0 20px 50px rgba(0,0,0,0.2),0 6px 16px rgba(0,0,0,0.1),0 2px 4px rgba(0,0,0,0.07);
  border-radius:1px;
  overflow:visible;
}
/* 胶带 */
#vv-card::before{
  content:'';position:absolute;top:-13px;left:50%;
  transform:translateX(-50%);
  width:68px;height:20px;
  background:rgba(255,255,255,0.48);
  backdrop-filter:blur(2px);
  box-shadow:0 1px 5px rgba(0,0,0,0.06);
  border-radius:2px;
  z-index:10;
}
/* 𐙚 印记 */
#vv-card::after{
  content:'𐙚';
  position:absolute;bottom:14px;right:16px;
  font-size:20px;
  color:rgba(139,107,74,0.15);
  font-family:'Cormorant Garamond',serif;
  line-height:1;
  pointer-events:none;
}
/* ── WRITE VIEW ── */
.w-topbar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--hd);border-bottom:1px solid var(--bd);flex-shrink:0;}
.w-topbar-mid{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.w-topbar-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--tx);}
.w-topbar-sub{font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;color:var(--mu);margin-top:1px;}
.w-date-chip{background:rgba(107,74,42,0.1);border:1px solid rgba(192,160,112,0.55);border-radius:20px;padding:5px 12px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--tx);white-space:nowrap;flex-shrink:0;}
.btn-done{
  background: linear-gradient(135deg, #7a5030 0%, #6b4a2a 100%);
  color: var(--li);
  border: none;
  border-radius: 20px;
  padding: 7px 16px;
  cursor: pointer;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-style: italic;
  letter-spacing: .03em;
  flex-shrink: 0;
  box-shadow: 0 1px 3px rgba(60,30,10,0.15);
  transition: box-shadow 0.15s, transform 0.1s;
}
.btn-done:active{box-shadow:0 1px 2px rgba(60,30,10,0.1);transform:translateY(1px);}
.w-textarea{flex:1;min-height:0;width:100%;background:var(--li);border:none;outline:none;font-family:'Lora','Noto Serif SC',serif;font-size:16px;color:var(--tx);line-height:1.95;padding:18px 18px;resize:none;-webkit-overflow-scrolling:touch;}
.w-catbar{flex-shrink:0;background:var(--hd);border-top:1px solid var(--bd);padding:8px 0 10px;}
.w-catrow{display:flex;gap:6px;overflow-x:auto;padding:0 14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.w-catrow::-webkit-scrollbar{display:none;}
.w-catrow .cat-item{flex-shrink:0;}
.w-draft-badge{font-size:10px;color:var(--mu);text-align:center;padding:3px 0 0;font-style:italic;opacity:0;transition:opacity .3s;pointer-events:none;}
.w-draft-badge.vis{opacity:1;}
.tbtn{font-family:'Lora','Noto Serif SC',serif;border:1px solid var(--bd);border-radius:3px;cursor:pointer;padding:5px 9px;background:var(--li);color:var(--tx);font-size:12px;}
.tbtn.on{background:var(--br);color:var(--li);}
.cat-item{display:flex;align-items:center;gap:2px;}
.cat-del{background:none;border:none;cursor:pointer;color:var(--mu);font-size:13px;padding:0 2px;line-height:1;opacity:0.6;}
.w-custom-cat{padding:6px 14px 0;}
.inp{width:100%;background:var(--li);border:1px solid var(--bd);border-radius:3px;outline:none;font-family:'Lora','Noto Serif SC',serif;color:var(--tx);padding:7px 10px;font-size:14px;}
/* ── LAYOUT VIEW ── */
.lprev{flex-shrink:0;background:var(--ca);border-bottom:1px solid var(--bd);padding:10px 12px;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;max-height:55vh;-webkit-overflow-scrolling:touch;}
.lprev-inner{max-width:100%;display:flex;justify-content:center;}
.lscroll{flex:1;overflow-y:auto;padding:14px;}
.sec{margin-bottom:15px;}
.slbl{display:block;font-family:'Lora',serif;font-size:11px;letter-spacing:.08em;color:#8b6b4a;margin-bottom:5px;font-weight:600;text-transform:uppercase;}
.brow{display:flex;flex-wrap:wrap;gap:5px;}
.div{height:1px;background:rgba(192,160,112,0.4);margin:4px 0 14px;}
input[type=range]{width:100%;accent-color:var(--br);}
.bgbtn{border:1px solid var(--bd);border-radius:3px;padding:5px 11px;cursor:pointer;font-family:'Lora','Noto Serif SC',serif;font-size:12px;color:var(--tx);}
.bgbtn.on{border:2px solid var(--br);}
.trow{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.tlbl{font-family:'Lora','Noto Serif SC',serif;font-size:13px;color:var(--tx);}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.cpbtn{border:1px solid var(--bd);border-radius:4px;padding:7px 0;cursor:pointer;font-size:12px;text-align:center;background:var(--li);color:var(--tx);}
.cpbtn.on{background:var(--br);color:var(--li);border-color:var(--br);}
.exrow{display:flex;gap:8px;padding-bottom:8px;}
.btn-exi{flex:1;background:var(--br);color:var(--li);border:none;border-radius:3px;padding:10px;cursor:pointer;font-family:'Lora',serif;font-size:13px;}
.btn-ext{flex:1;background:var(--li);color:var(--tx);border:1px solid var(--bd);border-radius:3px;padding:10px;cursor:pointer;font-family:'Lora',serif;font-size:13px;}
.sw{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0;}
.sw input{opacity:0;width:0;height:0;}
.sli{position:absolute;cursor:pointer;inset:0;background:#c8b090;border-radius:20px;transition:.3s;}
.sli:before{position:absolute;content:'';height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.sli{background:var(--br);}
input:checked+.sli:before{transform:translateX(16px);}
.preset-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px;}
.pbtn{font-family:'Lora',serif;border:1px solid var(--bd);border-radius:3px;cursor:pointer;padding:4px 9px;background:var(--li);color:var(--tx);font-size:12px;}
.pbtn.on{background:var(--br);color:var(--li);}
/* ── PREVIEW CARD (排版区) ── */
#pc{position:relative;border-radius:2px;overflow:hidden;box-shadow:0 2px 18px rgba(80,50,20,0.22);border:1.5px dashed rgba(139,107,74,0.28);}
#pc-vig{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(80,50,20,0.07) 100%);pointer-events:none;z-index:0;}
#pc-date{position:relative;z-index:1;font-family:'Cormorant Garamond','Noto Serif SC',serif;font-size:11px;font-style:italic;opacity:0.45;margin-bottom:18px;letter-spacing:.12em;}
#pc-body{position:relative;z-index:1;white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word;}
#pc-sig{position:relative;z-index:2;margin-top:18px;padding-top:10px;border-top:1px dashed rgba(139,107,74,0.22);font-family:'Caveat','Cormorant Garamond',cursive;font-size:13px;text-align:right;opacity:0.55;display:none;}
#pc-corner{position:absolute;font-family:'Lora','Noto Serif SC',serif;font-size:10px;letter-spacing:.06em;opacity:0.38;z-index:2;line-height:1.3;display:none;}
.rc-vig{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(80,50,20,0.07) 100%);pointer-events:none;z-index:0;}
.rc-date{position:relative;z-index:1;font-family:'Cormorant Garamond','Noto Serif SC',serif;font-size:11px;font-style:italic;opacity:0.45;margin-bottom:18px;letter-spacing:.12em;}
.rc-body{position:relative;z-index:1;white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word;}
.rc-corner{position:absolute;font-family:'Lora','Noto Serif SC',serif;font-size:10px;letter-spacing:.06em;opacity:0.38;z-index:2;line-height:1.3;}
/* ── WALL VIEW ── */
#vwall{background:#3a2e24;overflow:visible;display:none;flex-direction:column;height:100%;}
#vwall.active{display:flex;animation:vIn .18s ease;}
.wall-topbar{display:flex;align-items:center;padding:10px 14px;background:rgba(30,20,12,0.6);border-bottom:1px solid rgba(192,160,112,0.15);flex-shrink:0;position:relative;z-index:10;}
.wall-title{flex:1;text-align:center;font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:rgba(253,240,220,0.82);}
.wall-nav{display:flex;align-items:center;gap:6px;padding:7px 10px 7px 6px;flex-shrink:0;background:rgba(20,14,8,0.4);border-bottom:1px solid rgba(192,160,112,0.1);overflow-x:auto;scrollbar-width:none;}
.wall-nav::-webkit-scrollbar{display:none;}
.wall-nav-btn{background:none;border:none;cursor:pointer;color:rgba(253,240,220,0.55);font-size:20px;padding:0 4px;line-height:1;flex-shrink:0;}
.wall-nav-btn:active{color:rgba(253,240,220,0.9);}
.wall-nav-label{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:rgba(253,240,220,0.78);white-space:nowrap;flex-shrink:0;letter-spacing:.03em;padding:0 2px;}
.wall-nav-sep{width:1px;height:16px;background:rgba(192,160,112,0.25);flex-shrink:0;margin:0 2px;}
.wall-cat-tab{background:none;border:1px solid rgba(192,160,112,0.25);border-radius:20px;padding:3px 11px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:rgba(253,240,220,0.48);white-space:nowrap;flex-shrink:0;transition:all .15s;}
.wall-cat-tab.on{background:rgba(107,74,42,0.55);border-color:rgba(192,160,112,0.45);color:rgba(253,240,220,0.88);}
.wall-canvas{flex:1;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;}
.wall-board{position:relative;min-width:100%;min-height:100%;padding:24px 16px 80px;}
/* 便签贴片 */
.wall-note{
  position:absolute;
  width:140px;
  padding:14px 12px 18px;
  border-radius:1px;
  box-shadow:0 6px 20px rgba(0,0,0,0.25),0 2px 6px rgba(0,0,0,0.15);
  cursor:pointer;
  border:1px dashed rgba(139,107,74,0.25);
  transition:transform .15s,box-shadow .15s;
  user-select:none;
}
.wall-note:active{transform:scale(1.03) rotate(0deg)!important;box-shadow:0 12px 32px rgba(0,0,0,0.35);}
.wall-note-date{font-family:'Cormorant Garamond',serif;font-size:9px;font-style:italic;opacity:0.45;margin-bottom:8px;letter-spacing:.08em;}
.wall-note-body{font-size:12.5px;line-height:1.7;overflow:hidden;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;word-break:break-word;}
.wall-note-sig{font-family:'Caveat',cursive;font-size:10px;opacity:0.45;margin-top:8px;text-align:right;}
.wall-note-dot{position:absolute;top:8px;right:8px;width:6px;height:6px;border-radius:50%;background:rgba(107,74,42,0.4);}
.wall-note-dot.has-msg{background:#c0906a;box-shadow:0 0 6px rgba(192,144,106,0.5);}
/* 连线画布 */
#wall-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.wall-empty{text-align:center;padding:60px 20px;font-family:'Cormorant Garamond',serif;font-style:italic;color:rgba(253,240,220,0.3);font-size:16px;line-height:2;}
/* ── DELETE MODAL ── */
#del-modal{display:none;position:fixed;inset:0;z-index:500;align-items:flex-end;justify-content:center;}
#del-modal.show{display:flex;}
#del-modal-bg{position:absolute;inset:0;background:rgba(30,15,5,0.5);animation:fadein .2s;}
#del-modal-box{position:relative;background:var(--li);border-radius:16px 16px 0 0;padding:28px 22px 36px;width:100%;max-width:420px;animation:slideup .22s cubic-bezier(.4,0,.2,1);}
#del-modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--tx);text-align:center;margin-bottom:8px;}
#del-modal-sub{font-family:'Lora',serif;font-size:13px;color:var(--mu);text-align:center;margin-bottom:24px;line-height:1.6;}
.del-modal-btns{display:flex;flex-direction:column;gap:10px;}
.del-modal-confirm{background:rgba(180,60,50,0.12);color:#b23a32;border:1px solid rgba(180,60,50,0.25);border-radius:8px;padding:14px;font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;cursor:pointer;transition:background 0.2s,color 0.2s;}
.del-modal-cancel{background:none;border:1px solid var(--bd);border-radius:8px;padding:13px;font-family:'Lora',serif;font-size:14px;color:var(--mu);cursor:pointer;}
/* ── TOAST ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(60,40,20,0.88);color:#fff;padding:9px 22px;border-radius:22px;font-family:'Lora',serif;font-size:13px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:600;white-space:nowrap;}
#toast.show{opacity:1;}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slideup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
/* ═══════════════ MESSAGE VIEW ═══════════════ */
#vm{background:var(--li);}
#vwall{background:url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4'/%3E%3C/filter%3E%3Crect width='120' height='120' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"),#3D2B1F;background-blend-mode:overlay,normal;}
.vm-topbar{display:flex;align-items:center;padding:10px 14px;flex-shrink:0;background:var(--hd);border-bottom:1px solid var(--bd);}
/* 便签区背景 — 暖棕软木感 */
.vm-sticky-bg{
  flex-shrink:0;
  background:#8a7260;
  background-image:url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4'/%3E%3C/filter%3E%3Crect width='120' height='120' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  display:flex;align-items:flex-start;justify-content:center;
  padding:22px 20px 28px;
  max-height:35dvh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
/* 便签纸 — 浮在软木上 */
.vm-sticky-note{
  width:90%;max-width:280px;
  padding:24px 20px 20px;
  border:1.5px dashed rgba(139,107,74,0.28);
  box-shadow:0 8px 28px rgba(0,0,0,0.22),0 3px 8px rgba(0,0,0,0.12);
  border-radius:1px;
  position:relative;
  flex-shrink:0;
}
/* 胶带 */
.vm-sticky-note::before{
  content:'';position:absolute;top:-12px;left:50%;
  transform:translateX(-50%) rotate(-1deg);
  width:60px;height:18px;
  background:rgba(255,255,255,0.45);
  backdrop-filter:blur(2px);
  border-radius:2px;
  box-shadow:0 1px 4px rgba(0,0,0,0.07);
}
.vm-note-date{font-family:'Cormorant Garamond',serif;font-size:10px;font-style:italic;opacity:0.42;letter-spacing:.12em;margin-bottom:10px;}
.vm-note-body{white-space:pre-wrap;word-break:break-word;line-height:1.85;}
.vm-note-sig{font-family:'Caveat','Cormorant Garamond',cursive;font-size:12px;opacity:0.5;margin-top:12px;padding-top:8px;border-top:1px dashed rgba(139,107,74,0.2);text-align:right;}
.vm-note-cat{display:inline-block;font-size:9px;padding:1px 7px;border-radius:10px;background:rgba(107,74,42,0.1);color:var(--br);margin-top:8px;}
.vm-divider{display:flex;align-items:center;gap:10px;padding:6px 16px;flex-shrink:0;background:var(--li);}
.vm-divider::before,.vm-divider::after{content:'';flex:1;height:1px;background:rgba(160,130,90,0.35);}
.vm-divider-txt{font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;color:var(--mu);white-space:nowrap;letter-spacing:.08em;}
/* 信纸留言区 */
.vm-msgs{
  flex:1;min-height:0;overflow-y:auto;
  padding:12px 18px 6px;
  display:flex;flex-direction:column;
  gap:0;
  -webkit-overflow-scrolling:touch;
  background:#fdf9f2;
  background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(180,150,100,0.12) 28px);
  background-position:0 36px;
}
/* 每条留言是一行信纸 */
.vm-msg-row{
  display:flex;align-items:baseline;gap:8px;
  min-height:28px;padding:5px 0;
  position:relative;
}
.vm-msg-row:hover .vm-msg-del{opacity:1;}
.vm-msg-avatar{
  width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:9px;font-style:italic;
  flex-shrink:0;letter-spacing:0;line-height:1;margin-top:2px;
}
.vm-avatar-a{background:rgba(107,74,42,0.18);color:#6b4a2a;border:1px solid rgba(107,74,42,0.22);}
.vm-avatar-e{background:rgba(90,50,24,0.28);color:#4a2a10;border:1px solid rgba(90,50,24,0.3);}
.vm-msg-meta{
  font-family:'Cormorant Garamond',serif;font-size:10px;
  color:var(--mu);opacity:0.45;
  white-space:nowrap;flex-shrink:0;
  letter-spacing:.03em;font-style:italic;
  min-width:34px;
}
.vm-msg-meta.ai-meta{color:#7a4a2a;opacity:0.65;}
.vm-msg-text{
  font-family:'Lora','Noto Serif SC',serif;
  font-size:13.5px;line-height:28px;
  color:var(--tx);word-break:break-word;flex:1;
  white-space:pre-wrap;
}
.vm-msg-text.ai-text{color:#5a3018;font-style:italic;}
.vm-msg-del{
  background:none;border:none;cursor:pointer;
  font-size:12px;color:rgba(160,100,80,0.45);
  padding:0 2px;flex-shrink:0;opacity:0;
  transition:opacity .2s;line-height:1;
  align-self:center;
}
.vm-empty{text-align:center;padding:32px 20px;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--mu);font-size:14px;line-height:2.2;opacity:0.55;}
/* 输入区 */
.vm-input-area{display:flex;align-items:flex-end;gap:8px;padding:9px 14px 22px;background:var(--hd);border-top:1px solid var(--bd);flex-shrink:0;}
.vm-inp{flex:1;background:#fffdf8;border:1px solid rgba(180,150,110,0.38);border-radius:18px;padding:9px 14px;font-family:'Lora','Noto Serif SC',serif;font-size:13.5px;color:var(--tx);outline:none;resize:none;max-height:90px;overflow-y:auto;-webkit-overflow-scrolling:touch;line-height:1.55;box-shadow:inset 0 1px 3px rgba(100,70,30,0.05);transition:border-color .2s,box-shadow .2s;}
.vm-inp::placeholder{color:var(--mu);opacity:0.55;}
.vm-inp:focus{border-color:rgba(107,74,42,0.45);box-shadow:inset 0 1px 3px rgba(100,70,30,0.07),0 0 0 3px rgba(107,74,42,0.05);}
.vm-send{background:var(--br);border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;color:var(--li);font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .15s;box-shadow:0 2px 8px rgba(107,74,42,0.28);}
.vm-send:active{opacity:0.7;}
/* ── DATE PICKER ── */
#dp-ov{display:none;position:fixed;inset:0;z-index:450;align-items:flex-end;justify-content:center;background:rgba(30,15,5,0.5);}
#dp-ov.show{display:flex;animation:fadein .2s;}
#dp-box{background:var(--li);border-radius:20px 20px 0 0;width:100%;max-width:420px;padding:20px 16px 32px;animation:slideup .22s cubic-bezier(.4,0,.2,1);}
.dp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.dp-mth-lbl{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--tx);}
.dp-nbtn{background:none;border:none;cursor:pointer;color:var(--mu);font-size:28px;padding:0 6px;line-height:1;}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dp-wd{text-align:center;font-size:10px;color:var(--mu);padding:4px 0;}
.dp-day{background:transparent;border:1px solid transparent;border-radius:50%;width:36px;height:36px;margin:auto;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx);font-size:13px;font-family:'Lora',serif;}
.dp-day.today{border-color:var(--mu)!important;}
.dp-day.sel{background:var(--br);color:var(--li);}
.dp-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;}
.dp-cancel{background:none;border:1px solid var(--bd);border-radius:8px;padding:9px 20px;cursor:pointer;font-family:'Lora',serif;font-size:14px;color:var(--mu);}
.dp-ok{background:var(--br);color:var(--li);border:none;border-radius:8px;padding:9px 20px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;}
/* BG textures */
.bg-ivory{background-color:#fdf8f0 !important;background-image:none !important;}
.bg-aged {background-color:#f0e0c0 !important;background-image:none !important;}
.bg-lined{background-color:#fdf8f0 !important;background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(200,184,154,0.55) 28px) !important;background-origin:border-box !important;background-clip:border-box !important;}
.bg-grid {background-color:#fdf8f0 !important;background-image:linear-gradient(rgba(200,184,154,0.45) 1px,transparent 1px),linear-gradient(90deg,rgba(200,184,154,0.45) 1px,transparent 1px) !important;background-size:28px 28px !important;background-origin:border-box !important;background-clip:border-box !important;background-position:0 0 !important;}
.bg-dots {background-color:#fdf8f0 !important;background-image:radial-gradient(circle,rgba(180,155,115,0.55) 1.2px,transparent 1.2px) !important;background-size:20px 20px !important;}
.bg-kraft{background-color:#c8a060 !important;background-image:none !important;}
/* ── SETTINGS VIEW ── */
#vsettings{background:var(--li);}
.settings-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--hd);border-bottom:1px solid var(--bd);flex-shrink:0;}
.settings-back{font-size:20px;background:none;border:none;cursor:pointer;color:var(--tx);padding:0;line-height:1;}
.settings-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:var(--tx);flex:1;text-align:center;}
.settings-body{flex:1;overflow-y:auto;padding:20px 18px 40px;}
.settings-section{margin-bottom:28px;}
.settings-section-title{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.12em;color:var(--mu);text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--bd);}
.settings-row{display:flex;gap:10px;flex-wrap:wrap;}
.settings-btn{flex:1;min-width:120px;padding:11px 14px;background:var(--hd);border:1px solid var(--bd);border-radius:8px;font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--tx);cursor:pointer;text-align:center;transition:all .15s;}
.settings-btn:active{background:var(--bd);}
/* ── STATS CHART ── */
.stat-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px;}
.stat-nav-btn{background:none;border:none;cursor:pointer;color:var(--mu);font-size:20px;padding:0 4px;line-height:1;}
.stat-nav-label{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--tx);min-width:90px;text-align:center;}
.stat-summary{display:flex;gap:18px;margin-bottom:16px;}
.stat-chip{flex:1;background:var(--hd);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;text-align:center;}
.stat-chip-num{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--tx);line-height:1;}
.stat-chip-label{font-size:11px;color:var(--mu);margin-top:3px;letter-spacing:.06em;}
.stat-chart-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.stat-chart{display:flex;align-items:flex-end;gap:2px;height:90px;padding-bottom:20px;position:relative;min-width:100%;}
.stat-day-col{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;min-width:8px;}
.stat-bar-e{background:rgba(107,74,42,0.75);border-radius:2px 2px 0 0;width:5px;min-height:2px;transition:height .3s;}
.stat-bar-m{background:rgba(180,140,100,0.5);border-radius:2px 2px 0 0;width:5px;min-height:1px;transition:height .3s;}
.stat-day-label{font-size:8px;color:var(--mu);position:absolute;bottom:2px;text-align:center;}
.stat-legend{display:flex;gap:14px;margin-top:8px;justify-content:center;}
.stat-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu);}
.stat-legend-dot{width:8px;height:8px;border-radius:2px;}
/* ── WALL SETTINGS BUTTON ── */
.wall-cfg-btn{background:none;border:none;cursor:pointer;color:rgba(253,240,220,0.55);font-size:19px;padding:0;line-height:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s;}
.wall-cfg-btn:active{color:rgba(253,240,220,0.9);}
/* ── WALL SETTINGS PANEL ── */
#wall-panel{position:absolute;bottom:0;left:0;right:0;z-index:30;padding:20px 20px 32px;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
#wall-panel.open{transform:translateY(0);}
#wall-panel-overlay{position:absolute;inset:0;z-index:29;display:none;}
#wall-panel-overlay.open{display:block;}
.wall-panel-drag{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);margin:0 auto 18px;}
.wall-panel-section{margin-bottom:18px;}
.wall-panel-label{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.1em;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:9px;}
.wall-panel-row{display:flex;gap:8px;}
.wall-layout-btn{flex:1;padding:9px 0;border-radius:8px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);font-family:'Cormorant Garamond',serif;font-size:15px;cursor:pointer;transition:all .15s;text-align:center;}
.wall-layout-btn.on{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.95);}
.wall-bg-swatch{width:40px;height:40px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:all .15s;flex-shrink:0;}
.wall-bg-swatch.on{border-color:rgba(255,255,255,0.8);transform:scale(1.1);}
/* ── WALL BACKGROUND THEMES ── */
/* cork-brown default handled by #vwall base style */
/* rice-white */
#vwall[data-bg="rice"]{background:#F5F5F0;}
#vwall[data-bg="rice"] .wall-topbar,#vwall[data-bg="rice"] .wall-nav{background:rgba(230,228,220,0.97);border-bottom:1px solid rgba(160,148,120,0.18);}
#vwall[data-bg="rice"] .wall-title,#vwall[data-bg="rice"] .wall-nav-btn,#vwall[data-bg="rice"] .wall-nav-label{color:#4a3520;}
#vwall[data-bg="rice"] .wall-back-btn,#vwall[data-bg="rice"] .wall-cfg-btn{color:rgba(74,53,32,0.65);}
/* ancient-moss */
#vwall[data-bg="moss"]{background:url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4'/%3E%3C/filter%3E%3Crect width='120' height='120' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"),#4A5D4E;background-blend-mode:overlay,normal;}
/* dusk-indigo */
#vwall[data-bg="indigo"]{background:url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4'/%3E%3C/filter%3E%3Crect width='120' height='120' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"),#3E4A59;background-blend-mode:overlay,normal;}
/* terracotta */
#vwall[data-bg="terra"]{background:#8C7365;}
#vwall[data-bg="terra"] .wall-topbar,#vwall[data-bg="terra"] .wall-nav{background:rgba(100,82,70,0.96);border-bottom:1px solid rgba(80,60,45,0.2);}
/* oatmeal */
#vwall[data-bg="oat"]{background:#D2C5B3;}
#vwall[data-bg="oat"] .wall-topbar,#vwall[data-bg="oat"] .wall-nav{background:rgba(200,190,172,0.97);border-bottom:1px solid rgba(150,135,110,0.18);}
#vwall[data-bg="oat"] .wall-title,#vwall[data-bg="oat"] .wall-nav-btn,#vwall[data-bg="oat"] .wall-nav-label{color:#4a3520;}
#vwall[data-bg="oat"] .wall-back-btn,#vwall[data-bg="oat"] .wall-cfg-btn{color:rgba(74,53,32,0.6);}
/* warm-slate */
#vwall[data-bg="slate"]{background:#E2E2DF;}
#vwall[data-bg="slate"] .wall-topbar,#vwall[data-bg="slate"] .wall-nav{background:rgba(218,218,214,0.97);border-bottom:1px solid rgba(160,158,150,0.18);}
#vwall[data-bg="slate"] .wall-title,#vwall[data-bg="slate"] .wall-nav-btn,#vwall[data-bg="slate"] .wall-nav-label{color:#3a3a3a;}
#vwall[data-bg="slate"] .wall-back-btn,#vwall[data-bg="slate"] .wall-cfg-btn{color:rgba(58,58,58,0.55);}

/* ── VV BG PICKER ── */
.vv-grid-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:0;margin-left:auto;color:rgba(100,80,55,0.55);line-height:1;transition:color .15s;}
.vv-grid-btn:active{color:rgba(100,80,55,0.9);}

const DEFAULT_CATS=['泡泡','47','漂流瓶','Saudade','锚点','语言之外','₍ᐢ..ᐢ₎✉️'];

// ══════════════════════════════════════════

let entries=[], calY=new Date().getFullYear(), calM=new Date().getMonth();

function td(){return new Date().toISOString().slice(0,10);}
function gid(){return Math.random().toString(36).slice(2,11);}
function fd(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${y}年${Number(m)}月${Number(dd)}日`;}

// ══════════════════════════════════════════

const SB_URL='https://nhptfkluxwbssxkovfad.supabase.co';
const SB_KEY='sb_publishable_QxBNA1blQmE0B3sU1Pz4Xw_9jK-p0qS';
function sbH(extra={}){return{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json',...extra};}
async function sbQ(path,opts={}){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{headers:sbH(),...opts});
  if(!r.ok){const t=await r.text();console.error('SB error:',t);throw new Error(t);}
  const t=await r.text();return t?JSON.parse(t):null;
}

// ── ENTRIES ──
async function sa(){
  // save all entries (upsert batch)
  if(!entries.length)return;
  const rows=entries.map(e=>({id:e.id,date:e.date||'',content:e.content||'',category:e.category||null,starred:!!e.starred,style:e.style||null}));
  await sbQ('entries?on_conflict=id',{method:'POST',headers:sbH({'Prefer':'resolution=merge-duplicates'}),body:JSON.stringify(rows)});
}
async function saOne(ent){
  const row={id:ent.id,date:ent.date||'',content:ent.content||'',category:ent.category||null,starred:!!ent.starred,style:ent.style||null};
  await sbQ('entries?on_conflict=id',{method:'POST',headers:sbH({'Prefer':'resolution=merge-duplicates'}),body:JSON.stringify(row)});
}
async function sbDelEntry(id){
  await sbQ('entries?id=eq.'+encodeURIComponent(id),{method:'DELETE'});
}
async function la(){
  try{
    const rows=await sbQ('entries?select=*&order=date.desc,created_at.desc');
    if(rows&&rows.length){entries=rows;}
    else{
      // fallback: try localStorage migration
      const s=localStorage.getItem('tn5')||localStorage.getItem('tn4');
      if(s){entries=JSON.parse(s);if(entries.length){showToast('正在同步旧数据…');await sa();showToast('同步完成 ✓');}}
    }
  }catch(err){
    console.warn('Supabase load failed, using localStorage',err);
    try{const s=localStorage.getItem('tn5');if(s)entries=JSON.parse(s);}catch(e){}
  }
  try{const c=localStorage.getItem('tn-cats');if(c)customCats=JSON.parse(c);}catch(e){}
}
function saveCats(){try{localStorage.setItem('tn-cats',JSON.stringify(customCats));}catch(e){}}

let _prevView='vc'; // track where we came from
function showView(id){
  _prevView=document.querySelector('.view.active')?.id||'vc';
  document.querySelectorAll('.view').forEach(v=>{v.classList.remove('active');v.style.height='';});
  const _sv=document.getElementById(id);_sv.classList.add('active');
  if(window.visualViewport)_sv.style.height=window.visualViewport.height+'px';
  if(id!=='vc') history.pushState({view:id,prev:_prevView},'');
}
function showViewDirect(id){
  document.querySelectorAll('.view').forEach(v=>{v.classList.remove('active');v.style.height='';});
  const _svd=document.getElementById(id);_svd.classList.add('active');
  if(window.visualViewport)_svd.style.height=window.visualViewport.height+'px';
}
window.addEventListener('popstate',e=>{
  const cur=document.querySelector('.view.active');
  if(!cur||cur.id==='vc')return;
  const prev=e.state?.prev||'vc';
  if(cur.id==='vv'){
    if(prev==='vwall'){showViewDirect('vwall');}
    else{showViewDirect('vc');renderCal();renderDay();}
  }
  else if(cur.id==='vw'){autoSaveEntry();showViewDirect('vc');renderCal();renderDay();}
  else if(cur.id==='vl'){showViewDirect('vw');}
  else if(cur.id==='vm'){showViewDirect('vv');}
  else if(cur.id==='vwall'){showViewDirect('vc');renderCal();renderDay();}
  else{showViewDirect('vc');renderCal();renderDay();}
});
function navBack(){
  if(history.state&&history.state.view){history.back();}
  else{
    const cur=document.querySelector('.view.active');
    if(cur&&cur.id==='vv'){showViewDirect('vc');renderCal();renderDay();}
    else if(cur&&cur.id==='vw'){autoSaveEntry();showViewDirect('vc');renderCal();renderDay();}
    else if(cur&&cur.id==='vl'){showViewDirect('vw');}
    else{showViewDirect('vc');renderCal();renderDay();}
  }
}
function wallBack(){
  if(history.state&&history.state.view){history.back();}
  else{showViewDirect('vc');renderCal();renderDay();}
}

function renderSB(){
  const tl=document.getElementById('sb-tabs');
  const tabs=['全部','⭐ 收藏',...allCats()];
  tl.innerHTML='';
  tabs.forEach(t=>{
    const cnt=t==='全部'?entries.length:t==='⭐ 收藏'?entries.filter(e=>e.starred).length:entries.filter(e=>e.category===t).length;
    const b=document.createElement('button');
    b.className='sbtab'+(_sbt===t?' on':'');
    b.innerHTML=cnt>0?`${t} <span style="opacity:0.55;font-size:10px;">${cnt}</span>`:t;
    b.onclick=(e)=>{e.stopPropagation();_sbt=t;sbTagline(t);renderSBList();tl.querySelectorAll('.sbtab').forEach(x=>x.classList.remove('on'));b.classList.add('on');};
    tl.appendChild(b);
  });
  sbTagline(_sbt);renderSBList();

function renderSBList(){
  const q=(document.getElementById('sb-sq')||{}).value?.trim()||'';
  const ll=document.getElementById('sb-list');ll.innerHTML='';
  let fl=entries.map((e,i)=>({...e,_i:i})).sort((a,b)=>{
    const dc=b.date.localeCompare(a.date);
    return dc!==0?dc:b._i-a._i;
  });
  if(_sbt==='⭐ 收藏')fl=fl.filter(e=>e.starred);
  else if(allCats().includes(_sbt))fl=fl.filter(e=>e.category===_sbt);
  if(q)fl=fl.filter(e=>e.content.includes(q)||e.date.includes(q));
  if(!fl.length){ll.innerHTML='<div style="text-align:center;padding:28px;font-family:\'Cormorant Garamond\',serif;font-style:italic;color:var(--mu);font-size:15px;">暂无内容</div>';return;}
  fl.forEach(e=>{
    const d=document.createElement('div');d.className='sb-e';
    const ebg=e.style?.bg||'ivory';
    const ebgColor=(BGS.find(b=>b.id===ebg)||BGS[0]).c;
    let ebgImg='none';
    if(ebg==='lined')ebgImg='repeating-linear-gradient(transparent,transparent 17px,rgba(180,155,115,0.4) 18px)';
    else if(ebg==='grid')ebgImg='linear-gradient(rgba(180,155,115,0.35) 1px,transparent 1px),linear-gradient(90deg,rgba(180,155,115,0.35) 1px,transparent 1px)';
    else if(ebg==='dots')ebgImg='radial-gradient(circle,rgba(165,140,100,0.45) 1px,transparent 1px)';
    const ebgSize=ebg==='grid'?'18px 18px':ebg==='dots'?'13px 13px':'';
    d.style.cssText+=`background-color:${ebgColor};background-image:${ebgImg};${ebgSize?'background-size:'+ebgSize+';':''}`;
    d.innerHTML=`<div class="sb-e-date">${fd(e.date)}</div>
      <div class="sb-e-body" style="font-family:${e.style?.fontFamily||"'Lora',serif"}">${e.content||'（空）'}</div>
      <div class="sb-e-ft">${e.category?`<span class="chip" style="color:${catColor(e.category)}">${e.category}</span>`:''}${e.starred?'<span style="font-size:11px;">⭐</span>':''}</div>`;
    d.onclick=()=>{sbClose(null);openViewMode(e);};
    attachLongPress(d,e.id);
    ll.appendChild(d);
  });
}

let _lpTimer=null,_lpMoved=false;
function attachLongPress(el,entryId){
  el.addEventListener('touchstart',e=>{
    _lpMoved=false;
    _lpTimer=setTimeout(()=>{
      if(!_lpMoved)showCtxMenu(entryId,e.touches[0].clientX,e.touches[0].clientY);
    },500);
  },{passive:true});
  el.addEventListener('touchmove',()=>{_lpMoved=true;clearTimeout(_lpTimer);},{passive:true});
  el.addEventListener('touchend',()=>clearTimeout(_lpTimer),{passive:true});
  el.addEventListener('touchcancel',()=>clearTimeout(_lpTimer),{passive:true});
  el.addEventListener('contextmenu',e=>{e.preventDefault();showCtxMenu(entryId,e.clientX,e.clientY);});
}
function showCtxMenu(id,x,y){
  _ctxId=id;
  const e=entries.find(x=>x.id===id);
  document.getElementById('ctx-star-label').textContent=e?.starred?'取消收藏':'收藏';
  const m=document.getElementById('ctx-menu');
  const vw=window.innerWidth,vh=window.innerHeight;
  const mw=180,mh=100;
  m.style.left=Math.min(x,vw-mw-10)+'px';
  m.style.top=Math.min(y,vh-mh-10)+'px';
  m.classList.add('show');
  document.getElementById('ctx-bg').classList.add('show');
}
function hideCtxMenu(){
  document.getElementById('ctx-menu').classList.remove('show');
  document.getElementById('ctx-bg').classList.remove('show');
  _ctxId=null;
}
function ctxStar(){
  const e=entries.find(x=>x.id===_ctxId);
  if(e){e.starred=!e.starred;sa();renderDay();}
  hideCtxMenu();
}
function ctxDel(){
  const id=_ctxId;
  hideCtxMenu();
  editId=id;
  showDelModal();
}

function chM(d){calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCal();}
function renderCal(){
  document.getElementById('cmth').textContent=`${calY}年 ${MO[calM]}`;
  const g=document.getElementById('cg');g.innerHTML='';
  WD.forEach(w=>{const c=document.createElement('div');c.className='calwd';c.textContent=w;g.appendChild(c);});
  const f1=new Date(calY,calM,1).getDay(),dm=new Date(calY,calM+1,0).getDate(),today=td();
  const edates=new Set(entries.map(e=>e.date));
  for(let i=0;i<f1;i++)g.appendChild(document.createElement('div'));
  for(let d=1;d<=dm;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const b=document.createElement('button');
    b.className='calday'+(ds===today?' today':'')+(ds===selDay?' sel':'');
    b.textContent=d;
    if(edates.has(ds)){const dot=document.createElement('span');dot.className='caldot';b.appendChild(dot);}
    b.onclick=()=>{selDay=ds;renderCal();renderDay();};
    g.appendChild(b);
  }
  document.getElementById('ttl').textContent='· '+entries.length+' 篇';
}
function renderDay(){
  const a=document.getElementById('ea');a.innerHTML='';
  const de=entries.filter(e=>e.date===selDay);
  const h=document.createElement('div');h.className='dayhdr';
  h.innerHTML=`<div><div class="daytitle">${fd(selDay)}</div><div class="daysub">${de.length?de.length+' 篇':'今日留白'}</div></div>`;
  const nb=document.createElement('button');nb.className='btn-new';nb.textContent='+ 新增';nb.onclick=newE;h.appendChild(nb);a.appendChild(h);
  if(!de.length){a.insertAdjacentHTML('beforeend','<div class="empty"><div class="empty-ic">🌊</div><div class="empty-tx">今日留白，等待书写</div></div>');}
  else de.forEach(e=>a.appendChild(mkCard(e)));
}
function mkCard(e){
  const bgKey=e.style?.bg||'ivory';
  const bgColor=(BGS.find(b=>b.id===bgKey)||BGS[0]).c;
  const tc=BTC[bgKey]||'#3a2a1a';
  const d=document.createElement('div');d.className='ecard';
  d.style.backgroundColor=bgColor;
  if(bgKey==='lined')d.style.backgroundImage='repeating-linear-gradient(transparent,transparent 20px,rgba(180,155,115,0.38) 21px)';
  else if(bgKey==='grid'){d.style.backgroundImage='linear-gradient(rgba(180,155,115,0.32) 1px,transparent 1px),linear-gradient(90deg,rgba(180,155,115,0.32) 1px,transparent 1px)';d.style.backgroundSize='20px 20px';}
  else if(bgKey==='dots'){d.style.backgroundImage='radial-gradient(circle,rgba(165,140,100,0.42) 1px,transparent 1px)';d.style.backgroundSize='14px 14px';}
  if(e.style?.bgImage)d.style.cssText+=';background:#ede0ca;background-image:none;';
  d.innerHTML=`<div class="ecard-top"><div class="ecard-date" style="color:${tc}">${fd(e.date)}</div>
    <div class="ecard-meta">${e.category?`<span class="chip" style="color:${catColor(e.category)}">${e.category}</span>`:''}${e.starred?'<span style="font-size:12px;">⭐</span>':''}</div></div>
    <div class="ecard-body" style="font-family:${e.style?.fontFamily||"'Lora',serif"};color:${tc}">${e.content||'（空）'}</div>`;
  d.onclick=()=>openViewMode(e);
  attachLongPress(d,e.id);
  return d;
}

function openViewMode(e){
  viewEntryId=e.id;
  const _vvs=document.getElementById('vv-star');if(_vvs)_vvs.textContent=e.starred?'⭐':'☆';
  const wrap=document.getElementById('vv-card');
  wrap.innerHTML='';
  wrap.removeAttribute('style');
  const s=e.style||defStyle();
  const bgKey=s.bg||'ivory';
  const bgEntry=BGS.find(b=>b.id===bgKey)||BGS[0];
  const bgColor=bgEntry.c;
  let tc=BTC[bgKey]||'#3a2a1a';
  if(s.bgImage){
    wrap.style.cssText='background:url('+s.bgImage+') center/cover;background-size:cover;';
    tc=s.bgImageBright?'#3a2a1a':'#fdf8f0';
  } else {
    wrap.style.background=bgColor;
    // apply pattern overlays for lined/grid
    if(bgKey==='lined'){
      wrap.style.backgroundImage='repeating-linear-gradient(transparent,transparent 27px,rgba(200,184,154,0.5) 28px)';
    } else if(bgKey==='grid'){
      wrap.style.backgroundImage='linear-gradient(rgba(200,184,154,0.4) 1px,transparent 1px),linear-gradient(90deg,rgba(200,184,154,0.4) 1px,transparent 1px)';
      wrap.style.backgroundSize='28px 28px';
    } else if(bgKey==='dots'){
      wrap.style.backgroundImage='radial-gradient(circle,rgba(180,155,115,0.5) 1.2px,transparent 1.2px)';
      wrap.style.backgroundSize='20px 20px';
    } else {
      wrap.style.backgroundImage='none';
    }
  }
  const ff=s.fontFamily||"'Cormorant Garamond','Noto Serif SC',serif";
  const fs=(s.fontSize||15)+'px';
  const lh=s.lineHeight||1.88;
  const align=s.align||'left';
  if(s.showDate!==false){
    const de=document.createElement('div');
    de.style.cssText=`font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;color:${tc};letter-spacing:.12em;margin-bottom:14px;opacity:0.45;`;
    de.textContent=fd(e.date);
    wrap.appendChild(de);
  }
  const be=document.createElement('div');
  be.style.cssText=`font-family:${ff};font-size:${fs};line-height:${lh};text-align:${align};color:${tc};white-space:pre-wrap;word-break:break-word;`;
  be.textContent=e.content||'';
  wrap.appendChild(be);
  const preV=s.cornerPreset||'Echo';
  const ct=(s.showCorner!==false)?(preV==='custom'?s.cornerCustom:preV):'';
  if(ct){
    const se=document.createElement('div');
    se.style.cssText=`margin-top:20px;font-family:'Caveat','Cormorant Garamond',cursive;font-size:13px;color:${tc};text-align:right;border-top:1px dashed rgba(139,107,74,0.2);padding-top:9px;opacity:0.52;`;
    se.textContent='— '+ct;
    wrap.appendChild(se);
  }
  const _autoBgEnv=s.bgImage?'#2a1608':({ivory:'#b8a888',aged:'#9a7848',lined:'#b8a888',grid:'#b0a080',kraft:'#6a4828'})[bgKey]||'#9a8868';
  document.getElementById('vv').style.background=s.vvBgColor||_autoBgEnv;
  showView('vv');
}

function sampleImgBright(dataUrl,cb){
  const img=new Image();
  img.onload=()=>{
    try{
      const cv=document.createElement('canvas');cv.width=cv.height=16;
      const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,16,16);
      const d=ctx.getImageData(0,0,16,16).data;
      let sum=0;for(let i=0;i<d.length;i+=4)sum+=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
      cb(sum/(d.length/4)>140);
    }catch{cb(false);}
  };
  img.onerror=()=>cb(false);
  img.src=dataUrl;
}
function loadBg(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    _bgImg=ev.target.result;_bg='custom';
    sampleImgBright(_bgImg,bright=>{
      _bgImgBright=bright;bldBg();
      document.getElementById('clrbg').style.display='inline-block';upP();
    });
  };
  r.readAsDataURL(f);inp.value='';
}

  ta.value=content;
  ta.style.cssText='position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta);
  ta.focus();ta.select();
  let ok=false;

function doImport(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{const d=JSON.parse(ev.target.result);if(!Array.isArray(d))throw 0;
      const m=Object.fromEntries(entries.map(e=>[e.id,e]));
      d.forEach(e=>{m[e.id]=e;});entries=Object.values(m);
      showToast('正在同步到云端…');
      await sa();
      renderCal();renderDay();showToast(`已导入并同步 ${d.length} 条 ✓`);
    }catch(e){alert('文件格式有误');}
  };r.readAsText(f);inp.value='';

// Messages are stored in Supabase; we cache them locally per session
let _vmCache={}; // {entryId: [{_sbid, role, content, time}]}

async function vmLoadMsgs(){
  if(!viewEntryId)return[];
  if(_vmCache[viewEntryId])return _vmCache[viewEntryId];
  try{
    const rows=await sbQ('messages?entry_id=eq.'+encodeURIComponent(viewEntryId)+'&order=created_at.asc');
    _vmCache[viewEntryId]=(rows||[]).map(r=>({_sbid:r.id,role:r.role,content:r.content,time:r.time}));
  }catch(e){
    // fallback to localStorage
    try{const s=localStorage.getItem('tn-msgs-'+viewEntryId);_vmCache[viewEntryId]=s?JSON.parse(s):[];}catch(_){_vmCache[viewEntryId]=[];}
  }
  return _vmCache[viewEntryId];
}
async function vmInsertMsg(msg){
  // optimistic local update
  if(!_vmCache[viewEntryId])_vmCache[viewEntryId]=[];
  _vmCache[viewEntryId].push(msg);
  try{
    const row=await sbQ('messages',{method:'POST',headers:sbH({'Prefer':'return=representation'}),body:JSON.stringify({entry_id:viewEntryId,role:msg.role,content:msg.content,time:msg.time})});
    if(row&&row[0])msg._sbid=row[0].id;
  }catch(e){console.warn('msg save failed',e);}
}
async function vmDeleteMsg(sbid,localIdx){
  if(!_vmCache[viewEntryId])return;
  _vmCache[viewEntryId].splice(localIdx,1);
  if(sbid){
    try{await sbQ('messages?id=eq.'+sbid,{method:'DELETE'});}catch(e){console.warn('msg del failed',e);}
  }
}

function wallChM(dir){
  const[y,m]=_wallYM.split('-').map(Number);
  const d=new Date(y,m-1+dir,1);
  _wallYM=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  _wallCat='';
  buildWallCats();renderWall();
}
function buildWallCats(){
  const[y,m]=_wallYM.split('-');
  document.getElementById('wall-nav-label').textContent=`${y}年${Number(m)}月`;
  // rebuild nav row: keep first 4 elements (‹ label › sep), then add cat tabs
  const nav=document.getElementById('wall-nav');
  // remove old cat tabs (everything after index 3)
  while(nav.children.length>4)nav.removeChild(nav.lastChild);
  const cats=allCats().filter(cat=>entries.some(e=>e.category===cat&&e.date?.startsWith(_wallYM)));
  cats.forEach(cat=>{
    const b=document.createElement('button');
    b.className='wall-cat-tab'+(_wallCat===cat?' on':'');
    b.textContent=cat;
    b.onclick=()=>{
      _wallCat=_wallCat===cat?'':cat;
      nav.querySelectorAll('.wall-cat-tab').forEach(x=>x.classList.remove('on'));
      if(_wallCat)b.classList.add('on');
      renderWall();
    };
    nav.appendChild(b);
  });
}
function renderWall(){
  const board=document.getElementById('wall-board');
  const svg=document.getElementById('wall-svg');
  board.innerHTML='';board.appendChild(svg);svg.innerHTML='';
  let fl=entries.filter(e=>e.date&&e.content&&e.date.startsWith(_wallYM));
  if(_wallCat)fl=fl.filter(e=>e.category===_wallCat);
  if(!fl.length){
    const em=document.createElement('div');em.className='wall-empty';em.innerHTML='𐙚<br><br>这个月还没有随笔';
    board.appendChild(em);return;
  }
  const cols=_wallCols||2;
  // 动态 noteW：根据真实画布宽度计算，确保不溢出
  const _canvas=document.querySelector('.wall-canvas');
  const _cw=_canvas?_canvas.clientWidth:window.innerWidth;
  const gapX=cols===3?14:22,startX=14,startY=24,gapY=22;
  const noteW=Math.floor((_cw-2*startX-(cols-1)*gapX)/cols);
  const noteH=Math.round(noteW*1.28);
  const maxRot=3.5; // 所有列数相同旋转幅度
  const bodyFontSize=cols===3?'10px':'12.5px';
  const notePositions=[];
  fl.forEach((e,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    const _jMax=Math.min(6,Math.floor(gapX/3));
    const jx=Math.round(Math.sin(i*7.3)*_jMax);
    const jy=Math.round(Math.cos(i*5.1)*5);
    const rot=parseFloat((Math.sin(i*3.7)*maxRot).toFixed(1));
    const x=startX+col*(noteW+gapX)+jx;
    const y=startY+row*(noteH+gapY)+jy;
    notePositions.push({x,y,e});
    const s=e.style||defStyle();
    const bgKey=s.bg||'ivory';
    const bgColor=(BGS.find(b=>b.id===bgKey)||BGS[0]).c;
    let tc=BTC[bgKey]||'#3a2a1a';
    const hasMsgs=!!(_vmCache[e.id]&&_vmCache[e.id].length);
    const note=document.createElement('div');
    note.className='wall-note';
    let bgStyle;
    if(s.bgImage){
      bgStyle=`background:url(${s.bgImage}) center/cover;background-size:cover;`;
      tc=s.bgImageBright?'#3a2a1a':'#fdf8f0';
    } else {
      bgStyle=`background:${bgColor};`;
      if(bgKey==='lined')bgStyle+=`background-image:repeating-linear-gradient(transparent,transparent 22px,rgba(200,184,154,0.4) 23px);`;
      else if(bgKey==='grid')bgStyle+=`background-image:linear-gradient(rgba(200,184,154,0.35) 1px,transparent 1px),linear-gradient(90deg,rgba(200,184,154,0.35) 1px,transparent 1px);background-size:22px 22px;`;
      else if(bgKey==='dots')bgStyle+=`background-image:radial-gradient(circle,rgba(180,155,115,0.45) 1px,transparent 1px);background-size:16px 16px;`;
    }
    note.style.cssText=`left:${x}px;top:${y}px;width:${noteW}px;height:${noteH}px;overflow:hidden;transform:rotate(${rot}deg);${bgStyle}`;
    const dot=document.createElement('div');dot.className='wall-note-dot'+(hasMsgs?' has-msg':'');
    const dateEl=document.createElement('div');dateEl.className='wall-note-date';dateEl.style.color=tc;dateEl.textContent=fdShort(e.date);
    const bodyEl=document.createElement('div');bodyEl.className='wall-note-body';
    bodyEl.style.cssText=`font-family:${s.fontFamily||"'Lora',serif"};color:${tc};font-size:${bodyFontSize};`;
    bodyEl.textContent=e.content;
    note.appendChild(dot);note.appendChild(dateEl);note.appendChild(bodyEl);
    const pv=s.cornerPreset||'';
    const ct=(s.showCorner&&pv&&pv!=='custom')?pv:(s.showCorner&&pv==='custom'?s.cornerCustom:'');
    if(ct){const sig=document.createElement('div');sig.className='wall-note-sig';sig.style.color=tc;sig.textContent='— '+ct;note.appendChild(sig);}
    note.onclick=()=>{openViewMode(e);};
    board.appendChild(note);
  });
  const lastRow=Math.ceil(fl.length/cols);
  board.style.minHeight=(startY+lastRow*(noteH+gapY)+80)+'px';
  board.style.minWidth=(startX+cols*(noteW+gapX)+40)+'px';
  requestAnimationFrame(()=>{
    svg.setAttribute('width',board.scrollWidth);svg.setAttribute('height',board.scrollHeight);
    svg.style.cssText=`position:absolute;top:0;left:0;width:${board.scrollWidth}px;height:${board.scrollHeight}px;`;
    notePositions.forEach(({x,y,e})=>{
      try{
        const k=`tn-msgs-${e.id}`;const d=localStorage.getItem(k);
        if(!d||!JSON.parse(d).length)return;
        const x1=x+noteW-6,y1=y+6,x2=x+noteW+8,y2=y-10;
        const path=document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d',`M${x1},${y1} Q${x1+8},${y1-12} ${x2},${y2}`);
        path.setAttribute('stroke','rgba(192,144,106,0.5)');path.setAttribute('stroke-width','1.2');
        path.setAttribute('fill','none');path.setAttribute('stroke-dasharray','3,3');
        svg.appendChild(path);
      }catch{}
    });
  });
}

// ══ SETTINGS ══
let _statYM=(()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();
function goBack(){if(history.state&&history.state.view){history.back();}else{showViewDirect('vc');renderCal();renderDay();}}
function openSettings(){_statYM=(()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})();renderStats();showView('vsettings');}
function statChM(d){
  const[y,m]=_statYM.split('-').map(Number);
  const nd=new Date(y,m-1+d,1);
  _statYM=nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0');
  renderStats();
}
function renderStats(){
  const[y,m]=_statYM.split('-').map(Number);
  const label=document.getElementById('stat-label');
  label.textContent=y+'年'+MO[m-1];
  const daysInMonth=new Date(y,m,0).getDate();
  // daily entry counts
  const ec=Array(daysInMonth+1).fill(0);
  const mc=Array(daysInMonth+1).fill(0);
  const prefix=_statYM+'-';
  entries.forEach(e=>{
    if(!e.date||!e.date.startsWith(prefix))return;
    const d=parseInt(e.date.split('-')[2]);
    if(d>=1&&d<=daysInMonth)ec[d]++;
    try{
      const ms=localStorage.getItem('tn-msgs-'+e.id);
      if(ms){const arr=JSON.parse(ms);mc[d]+=(arr.length||0);}
    }catch{}
  });
  const eTot=ec.reduce((a,b)=>a+b,0);
  const mTot=mc.reduce((a,b)=>a+b,0);
  const activeDays=ec.filter(x=>x>0).length;
  document.getElementById('stat-e-total').textContent=eTot;
  document.getElementById('stat-m-total').textContent=mTot;
  document.getElementById('stat-days').textContent=activeDays;
  const maxVal=Math.max(1,...ec.slice(1),...mc.slice(1));
  const chart=document.getElementById('stat-chart');
  chart.innerHTML='';
  const chartH=70;
  for(let d=1;d<=daysInMonth;d++){
    const col=document.createElement('div');
    col.className='stat-day-col';
    col.style.cssText='position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:16px;gap:1px;';
    const eH=Math.max(2,Math.round((ec[d]/maxVal)*chartH));
    const mH=Math.max(ec[d]>0||mc[d]>0?1:0,Math.round((mc[d]/maxVal)*chartH));
    const bars=document.createElement('div');
    bars.style.cssText='display:flex;gap:1px;align-items:flex-end;';
    const be=document.createElement('div');be.className='stat-bar-e';be.style.height=eH+'px';
    if(ec[d]>0)be.title=`${d}日 ${ec[d]}篇随笔`;
    const bm=document.createElement('div');bm.className='stat-bar-m';bm.style.height=mH+'px';
    if(mc[d]>0)bm.title=`${d}日 ${mc[d]}条留言`;
    bars.appendChild(be);bars.appendChild(bm);
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:8px;color:var(--mu);position:absolute;bottom:2px;';
    lbl.textContent=(d%5===0||d===1||d===daysInMonth)?d:'';
    col.appendChild(bars);col.appendChild(lbl);
    chart.appendChild(col);
  }
}

// ══ VV BG PICKER ══
const VV_BG_OPTS=[
  {id:'auto', color:null, label:'自动'},
  {id:'cork', color:'#3D2B1F', label:'软木棕'},
  {id:'moss2',color:'#4A5D4E', label:'枯木绿'},
  {id:'indig',color:'#3E4A59', label:'烟灰蓝'},
  {id:'terr2',color:'#8C7365', label:'陶土'},
  {id:'oat2', color:'#D2C5B3', label:'燕麦'},
];
function vvBgPanelOpen(){
  const e=entries.find(x=>x.id===viewEntryId);if(!e)return;
  const curColor=(e.style||defStyle()).vvBgColor||null;
  const sw=document.getElementById('vv-bg-swatches');
  sw.innerHTML='';
  VV_BG_OPTS.forEach(opt=>{
    const btn=document.createElement('button');
    const isOn=opt.color===curColor;
    btn.className='vv-bg-sw'+(isOn?' on':'')+(opt.id==='auto'?' vv-bg-auto':'');
    btn.title=opt.label;
    if(opt.color)btn.style.background=opt.color;
    if(opt.id==='auto')btn.textContent='auto';
    btn.onclick=()=>vvSetBgColor(opt.color);
    sw.appendChild(btn);
  });
  document.getElementById('vv-bg-panel').classList.add('open');
  document.getElementById('vv-bg-overlay').classList.add('open');
}
function vvBgPanelClose(){
  document.getElementById('vv-bg-panel').classList.remove('open');
  document.getElementById('vv-bg-overlay').classList.remove('open');
}
function vvSetBgColor(colorOrNull){
  const e=entries.find(x=>x.id===viewEntryId);if(!e)return;
  e.style={...(e.style||defStyle()),vvBgColor:colorOrNull||null};
  sa();
  // 直接更新背景色，不重新渲染整个视图
  const _autoBg=(({ivory:'#b8a888',aged:'#9a7848',lined:'#b8a888',grid:'#b0a080',kraft:'#6a4828'})[(e.style.bg||'ivory')])||'#9a8868';
  document.getElementById('vv').style.background=colorOrNull||_autoBg;
  // refresh highlights
  document.querySelectorAll('.vv-bg-sw').forEach(b=>{
    const opt=VV_BG_OPTS.find(o=>o.label===b.title);
    b.classList.toggle('on',opt&&opt.color===colorOrNull);
  });
}

// ══ WALL PANEL ══
const WALL_BGS=[
  {id:'dark',  color:'#3D2B1F', label:'软木棕'},
  {id:'rice',  color:'#F5F5F0', label:'米白'},
  {id:'moss',  color:'#4A5D4E', label:'枯木绿'},
  {id:'indigo',color:'#3E4A59', label:'烟灰蓝'},
  {id:'terra', color:'#8C7365', label:'陶土'},
  {id:'oat',   color:'#D2C5B3', label:'燕麦'},
  {id:'slate', color:'#E2E2DF', label:'冷衫灰'},
];
let _wallCols=parseInt(localStorage.getItem('tn-wall-cols')||'2');
let _wallBg=localStorage.getItem('tn-wall-bg')||'dark';

function wallPanelOpen(){
  // Apply current panel state to bg-row swatches
  const row=document.getElementById('wall-bg-row');
  if(!row.children.length){
    WALL_BGS.forEach(bg=>{
      const sw=document.createElement('button');
      sw.className='wall-bg-swatch'+(bg.id===_wallBg?' on':'');
      sw.style.background=bg.color;
      sw.title=bg.label;
      sw.id='wsw-'+bg.id;
      sw.onclick=()=>setWallBg(bg.id);
      row.appendChild(sw);
    });
  }
  // sync layout buttons
  document.getElementById('wlb2').className='wall-layout-btn'+(_wallCols===2?' on':'');
  document.getElementById('wlb3').className='wall-layout-btn'+(_wallCols===3?' on':'');
  // sync swatches
  WALL_BGS.forEach(bg=>{
    const sw=document.getElementById('wsw-'+bg.id);
    if(sw)sw.className='wall-bg-swatch'+(bg.id===_wallBg?' on':'');
  });
  applyWallBg();
  document.getElementById('wall-panel').classList.add('open');
  document.getElementById('wall-panel-overlay').classList.add('open');
}
function wallPanelClose(){
  document.getElementById('wall-panel').classList.remove('open');
  document.getElementById('wall-panel-overlay').classList.remove('open');
}
function setWallCols(n){
  _wallCols=n;
  localStorage.setItem('tn-wall-cols',n);
  document.getElementById('wlb2').className='wall-layout-btn'+(n===2?' on':'');
  document.getElementById('wlb3').className='wall-layout-btn'+(n===3?' on':'');
  renderWall();
}
function setWallBg(id){
  _wallBg=id;
  localStorage.setItem('tn-wall-bg',id);
  WALL_BGS.forEach(bg=>{
    const sw=document.getElementById('wsw-'+bg.id);
    if(sw)sw.className='wall-bg-swatch'+(bg.id===id?' on':'');
  });
  applyWallBg();
}
function applyWallBg(){
  const vw=document.getElementById('vwall');
  vw.setAttribute('data-bg',_wallBg);
  // panel bg adapts to wall bg
  const dark=['dark','moss','indigo','terra'];
  const isDark=dark.includes(_wallBg);
  const panel=document.getElementById('wall-panel');
  panel.style.background=isDark?'rgba(30,24,18,0.96)':'rgba(200,190,170,0.97)';
  panel.style.setProperty('--panel-text',isDark?'rgba(255,255,255,0.7)':'rgba(60,40,20,0.7)');
}

  window.visualViewport.addEventListener('resize',_vpFit);
  window.visualViewport.addEventListener('scroll',_vpFit);
}
